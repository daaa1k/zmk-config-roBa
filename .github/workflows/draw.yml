name: "Draw Keymap"

on:
  workflow_dispatch:
  push:
    paths:
      - "config/roBa.keymap"
      - "keymap_drawer.config.yaml"
      - "config/roBa.dtsi"

jobs:
  draw:
    uses: caksoylar/keymap-drawer/.github/workflows/draw-zmk.yml@a44809b8cc718cbff646641f49a8f71a9368336d # v0.23.0
    permissions:
      contents: write
    with:
      commit_message: "docs: update keymap drawing"
      amend_commit: false
      keymap_patterns: "config/*.keymap"
      json_path: "config"
      config_path: "keymap_drawer.config.yaml" # config file, ignored if not exists
      output_folder: "keymap-drawer"
      destination: "both"
