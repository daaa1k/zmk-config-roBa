name: Common Lint

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: daaa1k/common-lint@b3e94e772d25d7d45786b598ef2a676a6b8d1234 # v1.4.5
        env:
          GITHUB_TOKEN: ${{ github.token }}
